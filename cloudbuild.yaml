steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/auctionhub:$SHORT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/auctionhub:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - auctionhub
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/auctionhub:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=PORT=8080,DATA_FILE=/app/data/listings.json,PROVIDERS_FILE=/app/config/providers.json
substitutions:
  _REGION: us-central1
  _REPOSITORY: auctionhub
